name: 跨平台构建

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      create_release:
        description: '是否创建 Release'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            artifact_name: 纸研社-Windows
            artifact_ext: .exe
          - os: macos-latest
            platform: macos
            artifact_name: 纸研社-macOS
            artifact_ext: .dmg
          - os: ubuntu-latest
            platform: linux
            artifact_name: 纸研社-Linux
            artifact_ext: .AppImage

    runs-on: ${{ matrix.os }}
    name: 构建 ${{ matrix.platform }}
    env:
      PYTHONIOENCODING: utf-8
      APPIMAGE_EXTRACT_AND_RUN: 1

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 安装 Windows 打包工具
        if: matrix.platform == 'windows'
        run: choco install innosetup --no-progress -y

      - name: 安装 Linux 打包依赖
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk squashfs-tools
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          sudo mv appimagetool /usr/local/bin/appimagetool

      - name: 构建应用和安装程序
        run: python build.py --clean --installer

      - name: 上传 Windows 可执行文件
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: 纸研社-Windows-EXE
          path: dist/纸研社.exe
          if-no-files-found: error

      - name: 上传 Windows 安装程序
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: 纸研社-Windows-Installer
          path: dist/纸研社_Setup_v*.exe
          if-no-files-found: error

      - name: 上传 macOS 安装程序
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: 纸研社-macOS-DMG
          path: dist/纸研社_v*.dmg
          if-no-files-found: error

      - name: 上传 Linux 安装程序
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: 纸研社-Linux-AppImage
          path: dist/纸研社-v*.AppImage
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.create_release == 'true'
    name: 发布 Release

    steps:
      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            release-assets/*
